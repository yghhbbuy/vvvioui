proxies:
  - name: Zo-SOCKS5
    type: socks5
    server: ts6.zocomputer.io
    port: 10522
    username: node
    password: ChangeMe-8f3b4a
    udp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - Zo-SOCKS5
      - DIRECT

# ✅ TCP并发（提速关键）
tcp-concurrent: true

# ✅ 安全DNS（不卡、不炸）
dns:
  enable: true
  ipv6: false

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

# ✅ 规则（国内直连，国外走代理）
rules:
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
