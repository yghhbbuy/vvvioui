proxies:
  - name: Zo-SOCKS5
    type: socks5
    server: ts6.zocomputer.io
    port: 10522
    username: node
    password: ChangeMe-8f3b4a
    udp: true

proxy-groups:
  - name: PROXY
    type: url-test
    proxies:
      - Zo-SOCKS5
      - DIRECT
    url: http://www.gstatic.com/generate_204
    interval: 300

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

rules:
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
